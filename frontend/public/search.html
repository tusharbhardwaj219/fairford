<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Fair Ford — Search</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

    <!-- Shared chrome (header/footer/topbar) styles -->
    <link rel="stylesheet" href="/frontend/css/style.css">
    <link rel="stylesheet" href="/frontend/css/search.css">

    <link rel="icon" type="image/png"
        href="https://res.cloudinary.com/dp4yririh/image/upload/v1781166637/LOGO_ja5rle.png">
</head>

<body>
    <main class="container" style="padding-top: 32px; padding-bottom: 64px;">
        <header class="page-head" style="margin-bottom: 24px;">
            <h1 style="font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 700; color: #0f4c81; margin: 0 0 8px;">
                Search products
            </h1>
            <p style="color: #4b5563; margin: 0;">
                Live results — type a product, brand, or molecule. Suggestions update as you type.
            </p>
        </header>

        <!-- Search input with auto-suggest dropdown -->
        <div class="ff-search-wrap" id="ffSearchWrap">
            <div class="ff-search-bar">
                <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                    <circle cx="11" cy="11" r="7" />
                    <path d="m20 20-3.5-3.5" />
                </svg>
                <input id="ffSearchInput" type="text" autocomplete="off" spellcheck="false"
                    placeholder="Search by product, brand, or molecule…">
                <button id="ffSearchClear" type="button" aria-label="Clear" style="display:none;">×</button>
            </div>
            <ul class="ff-suggest" id="ffSuggest" role="listbox" hidden></ul>
        </div>

        <!-- Result count -->
        <div class="ff-count" id="ffCount" style="color:#6b7280; font-size:13px; margin: 16px 0 12px;">
            Loading products…
        </div>

        <!-- Product grid -->
        <div class="ff-grid" id="ffGrid"></div>

        <!-- Empty state -->
        <div class="ff-empty" id="ffEmpty" style="display:none; text-align:center; padding: 60px 20px; color:#6b7280;">
            <svg width="44" height="44" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 12px; color:#9ca3af;">
                <circle cx="11" cy="11" r="7" />
                <path d="m20 20-3.5-3.5" />
            </svg>
            <h3 style="margin:0 0 6px; font-weight:600; color:#374151;">No products found</h3>
            <p style="margin:0;">Try a different keyword, or browse the full catalog.</p>
        </div>
    </main>

    <!-- Shared header/footer (matches home page) -->
    <script>window.__PAGE_KEY__ = '';</script>
    <script src="/frontend/js/data.js"></script>
    <script src="/frontend/js/common.js"></script>
    <script src="/frontend/js/page-chrome.js"></script>
    <script src="/frontend/js/search.js"></script>
</body>

</html>
