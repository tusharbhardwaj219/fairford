<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Fair Ford — Reset Password</title>
  <link rel="icon" type="image/png"
    href="https://res.cloudinary.com/dp4yririh/image/upload/v1782967649/fairford/site/m5d8pmtzdjr4dcgctvuc.png">
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', system-ui, sans-serif; background: #f4f8fe; color: #1a1a1a; display: flex; min-height: 100vh; align-items: center; justify-content: center; padding: 20px; }
    .card { background: #fff; border: 1px solid #e4e8ef; border-radius: 16px; box-shadow: 0 10px 40px rgba(10,30,60,.08); width: 100%; max-width: 420px; padding: 32px; }
    h1 { font-size: 22px; color: #0f4c81; margin: 0 0 6px; }
    p.sub { color: #6b7280; font-size: 14px; margin: 0 0 20px; }
    label { display: block; font-size: 13px; font-weight: 600; margin: 0 0 6px; color: #374151; }
    input { width: 100%; padding: 12px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 15px; outline: none; }
    input:focus { border-color: #0f4c81; box-shadow: 0 0 0 3px rgba(15,76,129,.12); }
    .hint { font-size: 12px; color: #9ca3af; margin: 8px 0 0; }
    button { width: 100%; margin-top: 16px; padding: 12px; background: #0f4c81; color: #fff; border: 0; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; }
    button:disabled { opacity: .6; cursor: not-allowed; }
    .msg { margin-top: 14px; font-size: 14px; padding: 10px 12px; border-radius: 8px; display: none; }
    .msg.ok { display: block; background: #e6f9f0; color: #036a40; }
    .msg.err { display: block; background: #fdeaea; color: #b11212; }
    .back { display: block; text-align: center; margin-top: 18px; font-size: 13px; color: #0f4c81; text-decoration: none; }
  </style>
</head>

<body>
  <div class="card">
    <h1>Set a new password</h1>
    <p class="sub">Choose a strong password for your account.</p>
    <form id="form">
      <label for="pw">New password</label>
      <input id="pw" type="password" required autocomplete="new-password" placeholder="At least 12 characters">
      <label for="pw2" style="margin-top:14px">Confirm password</label>
      <input id="pw2" type="password" required autocomplete="new-password" placeholder="Re-enter password">
      <p class="hint">Min 12 characters · upper &amp; lower case · a number · a special character (@$!%*?&amp;)</p>
      <button id="btn" type="submit">Reset password</button>
    </form>
    <div id="msg" class="msg"></div>
    <a class="back" href="login&amp;signup.html">&larr; Back to login</a>
  </div>

  <script>
    var params = new URLSearchParams(location.search),
        token  = params.get('token') || '';
    var form = document.getElementById('form'),
        btn  = document.getElementById('btn'),
        msg  = document.getElementById('msg');

    if (!token) {
      msg.textContent = 'This reset link is missing its token. Please request a new one.';
      msg.className = 'msg err';
      btn.disabled = true;
    }

    form.addEventListener('submit', async function (e) {
      e.preventDefault();
      var pw = document.getElementById('pw').value,
          pw2 = document.getElementById('pw2').value;
      msg.className = 'msg';
      if (pw !== pw2) { msg.textContent = 'Passwords do not match.'; msg.className = 'msg err'; return; }
      btn.disabled = true; btn.textContent = 'Resetting…';
      try {
        var res = await fetch('/api/auth/reset-password', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token: token, password: pw })
        });
        var data = await res.json();
        if (res.ok && data.success) {
          msg.textContent = (data.message || 'Password reset successful.') + ' Redirecting to login…';
          msg.className = 'msg ok';
          setTimeout(function () { location.href = 'login&signup.html'; }, 1800);
        } else {
          msg.textContent = data.message || 'Could not reset password.';
          msg.className = 'msg err';
          btn.disabled = false; btn.textContent = 'Reset password';
        }
      } catch (err) {
        msg.textContent = 'Something went wrong. Please try again.';
        msg.className = 'msg err';
        btn.disabled = false; btn.textContent = 'Reset password';
      }
    });
  </script>
</body>

</html>
